<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000042">
  <title>Lenskart | Live Pickup Monitor</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────── -->
  <div class="header">
    <img
      src="assets/lenskart-logo.png"
      onerror="this.src='https://static-nexs.lenskart.com/images/lenskartLogoForShipment.png'"
      alt="Lenskart Logo"
    >
    <h1>
      <span class="live-dot" aria-hidden="true"></span>
      LENSKART LIVE PICKUP MONITOR 📡
    </h1>
    <div id="clock" class="clock" aria-live="polite" aria-label="Current time"></div>
  </div>

  <!-- ── Last Updated Bar ───────────────────────────────────────────── -->
  <div id="lastUpdated" class="last-updated stale" aria-live="polite">
    ⏳ Counts: waiting for first push...
  </div>

  <!-- ── Dashboard ─────────────────────────────────────────────────── -->
  <main class="dashboard" role="main">

    <div class="row running" id="runningRow">
      <div class="label">Currently Running Pickups</div>
      <div id="current" class="value" aria-live="polite"></div>
    </div>

    <div class="row">
      <div class="label">First Next Upcoming</div>
      <div id="next1" class="value" aria-live="polite"></div>
    </div>

    <div class="row">
      <div class="label">Second Next Upcoming</div>
      <div id="next2" class="value" aria-live="polite"></div>
    </div>

    <div class="row" id="thirdRow">
      <div class="label">Third Next Upcoming</div>
      <div id="next3" class="value" aria-live="polite"></div>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    SUPPLY CHAIN COMMAND CENTER ⚡
    <div class="runner" aria-hidden="true">🏃‍♂️📦</div>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
